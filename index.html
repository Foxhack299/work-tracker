<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Pointeuse" />
    <meta name="description" content="Application de suivi du temps de travail" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Temps de Travail</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0a0a0a !important; min-height: 100vh; }
      #root { background: #0a0a0a !important; min-height: 100vh; }
    </style>
  </head>
  <body style="background:#0a0a0a; margin:0; padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(() => {
            console.log("Service Worker enregistré ✅");
          }).catch((err) => {
            console.log("Erreur Service Worker:", err);
          });
        });
      }
    </script>
  </body>
</html>
